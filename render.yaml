services:
  - type: web
    name: smartbnpl-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001

  - type: web
    name: smartbnpl-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_N8N_WEBHOOK_URL
        sync: false
